<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audience Growth Bot – by Nina Mistry</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #f9f8f6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 680px;
    height: 90vh;
    max-height: 780px;
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e4e1db;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(50, 106, 179, 0.08);
  }

  .header {
    background: #326ab3;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #85d0cd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }

  .header-text .name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.01em;
  }

  .header-text .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    margin-top: 2px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    word-wrap: break-word;
  }

  .msg.bot {
    align-self: flex-start;
    background: #eef4fb;
    color: #1a2a3a;
    border-bottom-left-radius: 4px;
  }

  .msg.user {
    align-self: flex-end;
    background: #326ab3;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.bot strong { font-weight: 600; }

  .starter-buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 4px 0;
  }

  .qr-btn {
    font-family: 'Montserrat', sans-serif;
    background: #fff;
    border: 1.5px solid #326ab3;
    color: #326ab3;
    padding: 11px 16px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
  }

  .qr-btn:hover {
    background: #326ab3;
    color: #fff;
  }

  .input-row {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    border-top: 1px solid #e4e1db;
    background: #fff;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border: 1.5px solid #d6d3cc;
    border-radius: 10px;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.4;
    background: #fafaf9;
  }

  textarea:focus { border-color: #326ab3; }

  .mic-btn {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    border: 1.5px solid #d6d3cc;
    background: #fafaf9;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .mic-btn:hover {
    border-color: #326ab3;
    background: #eef4fb;
  }

  .mic-btn.recording {
    border-color: #e74c3c;
    background: #fdeaea;
    animation: pulse-mic 1.5s infinite;
  }

  .mic-btn svg {
    width: 18px;
    height: 18px;
    fill: #666;
    transition: fill 0.15s ease;
  }

  .mic-btn:hover svg { fill: #326ab3; }
  .mic-btn.recording svg { fill: #e74c3c; }

  .mic-btn.unsupported {
    display: none;
  }

  @keyframes pulse-mic {
    0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.3); }
    50% { box-shadow: 0 0 0 8px rgba(231, 76, 60, 0); }
  }

  .send-btn {
    background: #326ab3;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    height: 42px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s ease;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #28578f; }
  .send-btn:disabled { background: #b0c4de; cursor: not-allowed; }

  .typing-indicator {
    align-self: flex-start;
    padding: 12px 16px;
    background: #eef4fb;
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    display: none;
  }

  .typing-indicator span {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: #8eaed4;
    border-radius: 50%;
    margin-right: 4px;
    animation: bounce 1.2s infinite ease-in-out;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; margin-right: 0; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .voice-status {
    font-size: 11px;
    color: #e74c3c;
    padding: 0 16px 4px;
    display: none;
    font-weight: 500;
  }

  .voice-status.active {
    display: block;
  }
</style>
</head>
<body>
<div class="chat-wrapper">
  <div class="header">
    <div class="header-avatar">N</div>
    <div class="header-text">
      <div class="name">Audience Growth Bot</div>
      <div class="subtitle">by Nina Mistry</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      Hey, welcome. 👋<br><br>
      I'm here to help you figure out how to get the right people into your world, so that when you're ready to sell, they're already paying attention.<br><br>
      No overwhelm. No ten-step plan. Just clarity.<br><br>
      <strong>Where are you at right now?</strong>
      <div class="starter-buttons" id="starters">
        <button class="qr-btn" onclick="pickStarter(this)">🌱 I want to grow my audience but I don't know where to start</button>
        <button class="qr-btn" onclick="pickStarter(this)">😩 I'm putting myself out there but the right people aren't finding me</button>
        <button class="qr-btn" onclick="pickStarter(this)">🤔 I know what I sell but I don't know how to get people through the door</button>
        <button class="qr-btn" onclick="pickStarter(this)">🔄 I've tried a few things and nothing's really stuck</button>
      </div>
    </div>
    <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>
  </div>

  <div class="voice-status" id="voiceStatus">🎙️ Listening...</div>

  <div class="start-again">
    <button onclick="startAgain()">Start again</button>
  </div>

  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Type your message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="Voice input">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById("messages");
const typingEl = document.getElementById("typing");
const inputEl = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
const voiceStatus = document.getElementById("voiceStatus");

let conversationHistory = [];
let isLoading = false;

// --- Voice Input ---
let recognition = null;
let isRecording = false;

function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    micBtn.classList.add("unsupported");
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "en-GB";
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = function(event) {
    let transcript = "";
    for (let i = 0; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    inputEl.value = transcript;
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  };

  recognition.onend = function() {
    isRecording = false;
    micBtn.classList.remove("recording");
    voiceStatus.classList.remove("active");

    // Auto-send if there's text
    if (inputEl.value.trim()) {
      sendMessage();
    }
  };

  recognition.onerror = function(event) {
    isRecording = false;
    micBtn.classList.remove("recording");
    voiceStatus.classList.remove("active");

    if (event.error === "not-allowed") {
      voiceStatus.textContent = "Microphone access denied — check your browser settings";
      voiceStatus.classList.add("active");
      setTimeout(() => voiceStatus.classList.remove("active"), 4000);
    }
  };
}

function toggleVoice() {
  if (!recognition) return;

  if (isRecording) {
    recognition.stop();
    isRecording = false;
    micBtn.classList.remove("recording");
    voiceStatus.classList.remove("active");
  } else {
    inputEl.value = "";
    recognition.start();
    isRecording = true;
    micBtn.classList.add("recording");
    voiceStatus.textContent = "🎙️ Listening...";
    voiceStatus.classList.add("active");
  }
}

function startAgain() {
  conversationHistory = [];
  messagesEl.innerHTML = `
    <div class="msg bot">
      Hey, welcome. 👋<br><br>
      I'm here to help you figure out how to get the right people into your world, so that when you're ready to sell, they're already paying attention.<br><br>
      No overwhelm. No ten-step plan. Just clarity.<br><br>
      <strong>Where are you at right now?</strong>
      <div class="starter-buttons" id="starters">
        <button class="qr-btn" onclick="pickStarter(this)">🌱 I want to grow my audience but I don't know where to start</button>
        <button class="qr-btn" onclick="pickStarter(this)">😩 I'm putting myself out there but the right people aren't finding me</button>
        <button class="qr-btn" onclick="pickStarter(this)">🤔 I know what I sell but I don't know how to get people through the door</button>
        <button class="qr-btn" onclick="pickStarter(this)">🔄 I've tried a few things and nothing's really stuck</button>
      </div>
    </div>
    <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>
  `;
}

initVoice();

// --- Chat ---
function pickStarter(btn) {
  const text = btn.textContent;
  document.getElementById("starters").remove();
  sendMessage(text);
}

async function sendMessage(overrideText) {
  const text = (overrideText || inputEl.value).trim();
  if (!text || isLoading) return;

  inputEl.value = "";
  inputEl.style.height = "auto";
  isLoading = true;
  sendBtn.disabled = true;

  appendMessage(text, "user");
  conversationHistory.push({ role: "user", content: text });

  typingEl.style.display = "block";
  scrollToBottom();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversationHistory })
    });

    const data = await res.json();
    const reply = data.reply || "Something went wrong — try again.";

    conversationHistory.push({ role: "assistant", content: reply });
    typingEl.style.display = "none";
    appendMessage(reply, "bot");

  } catch (err) {
    typingEl.style.display = "none";
    appendMessage("Something went wrong — try again.", "bot");
  }

  isLoading = false;
  sendBtn.disabled = false;
  scrollToBottom();
}

function appendMessage(text, role) {
  const div = document.createElement("div");
  div.className = "msg " + role;

  if (role === "bot") {
    div.innerHTML = formatBot(text);
  } else {
    div.textContent = text;
  }

  messagesEl.insertBefore(div, typingEl);
  scrollToBottom();
}

function formatBot(text) {
  return text
    .replace(/\u2014/g, ",")
    .replace(/^---+$/gm, "")
    .replace(/^___+$/gm, "")
    .replace(/^\*\*\*+$/gm, "")
    .replace(/^#{1,6}\s+/gm, "")
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n{3,}/g, "\n\n")
    .replace(/\n/g, "<br>");
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

inputEl.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});
</script>
</body>
</html>
